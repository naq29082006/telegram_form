async function getToken()
{

const header={alg:"RS256",typ:"JWT"};

const now=Math.floor(Date.now()/1000);

const payload={
iss:credentials.client_email,
scope:"https://www.googleapis.com/auth/drive.readonly",
aud:"https://oauth2.googleapis.com/token",
iat:now,
exp:now+3600
};

const jwt=KJUR.jws.JWS.sign(
"RS256",
JSON.stringify(header),
JSON.stringify(payload),
credentials.private_key
);

const res=await fetch("https://oauth2.googleapis.com/token",{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:"grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion="+jwt
});

const data=await res.json();

return data.access_token;

}

function renderFolders(files) {

}

function getNumber(name) {
    const match = name.match(/^\d+/);
    if (match) return parseInt(match[0]);
    return Number.MAX_SAFE_INTEGER;
}

async function loadFolder() {
    const token = await getToken();

    const url =
        "https://www.googleapis.com/drive/v3/files" +
        "?q=" + encodeURIComponent(
            "'" + folderId + "' in parents and trashed=false and " +
            "mimeType='application/vnd.google-apps.folder'"
        ) +
        "&fields=files(id,name)" +
        "&pageSize=1000";

    const res = await fetch(url, {
        headers: { Authorization: "Bearer " + token }
    });

    const data = await res.json();

    allFolder = (data.files || []).sort((a, b) => {
        const numA = getNumber(a.name);
        const numB = getNumber(b.name);
        if (numA !== numB) return numA - numB;
        return a.name.localeCompare(b.name);
    });

    renderFolders(allFolder);
    renderFiles([]);
}

async function loadFilesInFolder(parentId) {
    const token = await getToken();

    const url =
        "https://www.googleapis.com/drive/v3/files" +
        "?q=" + encodeURIComponent(
            "'" + parentId + "' in parents and trashed=false and " +
            "mimeType!='application/vnd.google-apps.folder'"
        ) +
        "&fields=files(id,name,mimeType)" +
        "&pageSize=1000";

    const res = await fetch(url, {
        headers: { Authorization: "Bearer " + token }
    });

    const data = await res.json();

    // chỉ giữ file có tên .xlsx (không phân biệt hoa thường)
    allFiles = (data.files || [])
        .filter(f => (f.name || "").toLowerCase().endsWith(".xlsx"))
        .sort((a, b) =>
            a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: "base" })
        );

    renderFiles(allFiles);
}

async function downloadXlsx(fileId, fileName, mimeType) {
    const token = await getToken();

    let url;
    if (mimeType === "application/vnd.google-apps.spreadsheet") {
        url = `https://www.googleapis.com/drive/v3/files/${encodeURIComponent(fileId)}/export?mimeType=` +
            encodeURIComponent("application/vnd.openxmlformats-officedocument.spreadsheetml.sheet");
        if (!fileName.toLowerCase().endsWith(".xlsx")) fileName += ".xlsx";
    } else {
        url = `https://www.googleapis.com/drive/v3/files/${encodeURIComponent(fileId)}?alt=media`;
        if (!fileName.toLowerCase().endsWith(".xlsx")) fileName += ".xlsx";
    }

    const res = await fetch(url, {
        headers: { Authorization: "Bearer " + token }
    });

    if (!res.ok) {
        const t = await res.text();
        throw new Error(`Download failed: ${res.status} ${t}`);
    }

    const blob = await res.blob();
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}

document.getElementById("loadfolder").addEventListener("change", async function () {

document.getElementById("searchFile").addEventListener("input", function () {
    const keyword = this.value.toLowerCase().trim();
    if (!keyword) {

    }
    const filtered = allFiles.filter(f => f.name.toLowerCase().includes(keyword));
    renderFiles(filtered);
});
