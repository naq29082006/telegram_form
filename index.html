<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="font-family: Arial; text-align:center; padding:30px;">

<h2>Form nhập API</h2>

<input id="apikey" placeholder="Nhập API Key" style="padding:10px;width:80%;"><br><br>

<button onclick="sendData()" style="padding:10px 20px;">
Gửi
</button>

<script>
function sendData() {
    let key = document.getElementById("apikey").value;

    Telegram.WebApp.sendData(JSON.stringify({
        apikey: key
    }));

    Telegram.WebApp.close();
}
</script>

</body>
</html>
