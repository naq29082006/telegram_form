<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
    font-family: Arial;
    padding:20px;
    background:#f2f2f2;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    background:#0088cc;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
}
</style>
</head>

<body>

<h3>Test WebApp</h3>

<input id="name" placeholder="Nhập tên">
<input id="phone" placeholder="Nhập số điện thoại">

<button onclick="sendData()">Gửi về bot</button>

<script>
const tg = window.Telegram.WebApp;

// 🔥 BẮT BUỘC
tg.ready();
tg.expand();

function sendData() {

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;

    let data = {
        name: name,
        phone: phone,
        time: new Date().toLocaleString()
    };

    // 🔥 gửi về bot
    tg.sendData(JSON.stringify(data));

    // debug
    alert("Đã gửi!");
}
</script>

</body>
</html>
